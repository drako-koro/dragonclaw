# DragonClaw Docker Compose
# Secure deployment with resource limits and isolation

services:
  dragonclaw:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: dragonclaw
    restart: unless-stopped
    ports:
      - "3847:3847"  # All interfaces (needed for VirtualBox NAT port forwarding)
    volumes:
      # Persist workspace data
      - dragonclaw-workspace:/app/workspace
      # Persist vault (encrypted credentials)
      - dragonclaw-vault:/app/config/.vault
      # Author OS tools (read-only mount for templates/references)
      - ${AUTHOR_OS_PATH:-~/author-os}:/app/author-os:ro
    environment:
      - NODE_ENV=production
      - DRAGONCLAW_VAULT_KEY=${DRAGONCLAW_VAULT_KEY:-}
    # Security: Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Security: No privilege escalation
    security_opt:
      - no-new-privileges:true
    # Network: Allow outbound for AI APIs and research
    networks:
      - dragonclaw-net

  # Optional: Ollama for free local AI
  # Uncomment to enable — requires 4-8GB extra RAM in the VM
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: dragonclaw-ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '4.0'
  #         memory: 8G
  #   networks:
  #     - dragonclaw-net
  #   # Pull default model on first run
  #   # Run: docker exec dragonclaw-ollama ollama pull qwen3.5:9b

networks:
  dragonclaw-net:
    driver: bridge

volumes:
  dragonclaw-workspace:
  dragonclaw-vault:
  # ollama-models:
